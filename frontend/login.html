<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPARK SOC - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#0d1421;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(218,41,28,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(26,86,219,.06) 0%,transparent 50%);pointer-events:none}
.card{background:#161d2e;border:1px solid #1e2a3d;border-radius:12px;padding:40px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.lmark{width:38px;height:38px;background:#da291c;border-radius:8px;display:flex;align-items:center;justify-content:center}
.lmark svg{width:22px;height:22px;fill:#fff}
.lname{font-size:18px;font-weight:600;letter-spacing:-.01em}
.lsub{font-size:11px;color:#5a7ba5;font-weight:400}
h2{font-size:15px;font-weight:600;color:#e2e8f0;margin-bottom:6px;text-align:center}
.sub{font-size:12px;color:#5a7ba5;text-align:center;margin-bottom:28px}
.field{margin-bottom:16px}
label{display:block;font-size:11px;font-weight:600;color:#8a9bb0;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
input{width:100%;background:#0d1421;border:1px solid #1e2a3d;border-radius:6px;padding:10px 14px;color:#e2e8f0;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
input:focus{border-color:#da291c}
input::placeholder{color:#3a4a5e}
.err{background:rgba(218,41,28,.1);border:1px solid rgba(218,41,28,.3);border-radius:6px;padding:10px 14px;font-size:12px;color:#f87171;margin-bottom:16px;display:none}
.btn-login{width:100%;background:#da291c;color:#fff;border:none;border-radius:6px;padding:11px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:background .15s;margin-top:4px}
.btn-login:hover{background:#c0241a}
.btn-login:disabled{background:#4a1a1a;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin:22px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#1e2a3d}
.divider span{font-size:11px;color:#3a4a5e;white-space:nowrap}
.btn-sso{width:100%;background:#0d1421;border:1px solid #1e2a3d;border-radius:6px;padding:10px 14px;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;color:#e2e8f0;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .15s,background .15s;margin-bottom:10px;text-decoration:none}
.btn-sso:hover{border-color:#3a5a8a;background:#111827}
.btn-sso svg{width:18px;height:18px;flex-shrink:0}
.hint{font-size:11px;color:#3a4a5e;text-align:center;margin-top:22px;line-height:1.6}
.hint b{color:#5a7ba5}
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="logo">
    <div class="lmark">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div>
      <div class="lname">SPARK SOC</div>
      <div class="lsub">NG-SOC as a Service - Fortinet</div>
    </div>
  </div>
  <h2>Acesso ao Painel</h2>
  <p class="sub">Entre com suas credenciais para continuar</p>
  <div class="err" id="errMsg"></div>
  <form id="loginForm">
    <div class="field">
      <label for="username">Usuario</label>
      <input type="text" id="username" placeholder="usuario" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="********" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
  </form>
  <div class="divider"><span>ou continue com</span></div>
  <a href="/auth/microsoft" class="btn-sso">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="10" height="10" fill="#f25022"/>
      <rect x="13" y="1" width="10" height="10" fill="#7fba00"/>
      <rect x="1" y="13" width="10" height="10" fill="#00a4ef"/>
      <rect x="13" y="13" width="10" height="10" fill="#ffb900"/>
    </svg>
    Entrar com Microsoft
  </a>
  <a href="/auth/google" class="btn-sso">
    <svg viewBox="0 0 24 24">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Entrar com Google
  </a>
  <div class="hint">
    Usuarios padrao: <b>admin</b> / <b>analista</b> / <b>viewer</b><br>
    Senhas: Admin@2026 - Spark@2026 - Viewer@2026
  </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (event) => {
  event.preventDefault();
  const button = document.getElementById('btnLogin');
  const errorBox = document.getElementById('errMsg');
  button.disabled = true;
  button.textContent = 'Verificando...';
  errorBox.style.display = 'none';

  try {
    const response = await fetch('/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      })
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'Falha no login');
    window.location.href = '/';
  } catch (error) {
    errorBox.textContent = error.message;
    errorBox.style.display = 'block';
    button.disabled = false;
    button.textContent = 'Entrar';
  }
});
</script>
</body>
</html>
